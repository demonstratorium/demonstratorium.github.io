    <!-- MODAL -->
    <div class="modal">
      <div class="modal-content">
        <div class="modal-form">
          <span>Formular</span>
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button id="formsave">OK</button>
        </div>
      </div>
    </div>

    <!-- DATALISTS -->
    <div id="datalists">
      <datalist id="NV">
        <option value="N.V.">
      </datalist>
      <datalist id="style">
        <option value="nn">keineFunktion</option>
        <option value="i2m">Modal-Fenster</option>
        <option value="uf">FilterDimension</option>
        <option value="BC">BarCode</option>
      </datalist>
      <datalist id="media">
        <option value="td-hidden">ausblenden</option>
        <option value="th-width-3">S</option>
        <option value="th-width-5">M</option>
        <option value="th-width-8">L</option>
      </datalist>
    </div>

    <!-- HEADER -->
    <header>
      <div><sup>NEW.IT@</sup> <strong>ShopFloor</strong></div>
      <div>Datenmanagement on GitHub</div>
      <div>
        <span id="info">...</span>
        <span>
          <svg class="s-icon"><use xlink:href="#vw-task" /></svg>
          <svg class="s-icon"><use xlink:href="#vw-logout" /></svg>
        </span>
      </div>
    </header>

    <nav></nav>

    <section>
      <main></main>
    </section>

    <footer>
      &copy; 2026-06-25 by hermes@wolfsflow
      <span>datengetrieben · funktional · hierarchisch · agentisch</span>
      <span>impressum | kontakt | feedback</span>
    </footer>

    <script async type="module" src="app.mjs"></script>
    <script>
      let fbtnsave = async event => {
        console.info(`Click event fired on ${this.nodeName} Does it bubble? ${event.bubbles}`);
        modal.style.display = 'none';
      };

      const
        modal        = document.querySelectorAll('.modal')[0]
      , modalform    = document.querySelectorAll('.modal-form')[0]
      , btnsave      = document.querySelectorAll('#formsave')[0]
      , main         = document.querySelectorAll('main')[0]
      , PARAMS       = (location?.['search'] || '?NAME=PAUL&AF=AF200&TP=2700-201-001-BZ1&DAY=2023-06-30&TEAM=FSCHICHT').slice(1).split('&').reduce((t, e) => { t[e.split('=')[0]] = e.split('=')[1]; return t }, {})
      , LDATA        = {
            "rdf": {
              title: "RDF Tripel",
              subtitle: "RDF_erfassen",
              icon: "vw-gridview",
              info: "Subject Praedikat Objekt",
              form: [
                { l: "Subjekt", v: "xcontainsy", n: "nRDF" },
                { l: "Praedikat", v: "some", n: "BEZ" },
                { l: "Objekt", v: "type", n: "OBJ" }
              ]
            },
            "person": {
              title: "Person",
              subtitle: "Adresse_erfassen",
              icon: "vw-edit",
              info: "Name Vorname",
              form: [
                { l: "Name", v: PARAMS?.["NAME"] || "Name", n: "name" },
                { l: "Vorname", v: "Vorname", n: "firstname" },
                { l: "Strasse", v: "Strasse", n: "street" },
                { l: "PLZ", v: "09110", n: "postalcode" },
                { l: "Ort", v: "Chemnitz", n: "city" },
                { l: "Telefon", v: "Telefon", n: "phone", t: "tel" },
                { l: "Code", v: "PW3432", n: "passwrd", t: "password" },
                { l: "eMail", v: "a@b.c", n: "mail", t: "email" }
              ]
            },
            "meldung": {
              title: "IH-Meldung",
              subtitle: "wannwowas",
              icon: "vw-download",
              info: "schnelle Rückmeldung",
              form: [
                { l: "TP", v: PARAMS?.["TP"] || "Technischer Platz", n: "tpl" },
                { l: "AF", v: PARAMS?.["AF"] || "Arbeitsfolge", n: "af" },
                { l: "Massnahme", v: "Massnahme", n: "action" },
                { l: "Bemerkung", v: "Bemerkung", n: "comment" },
                { l: "ElMech", v: "elektrisch|mechanisch", n: "typ" },
                { l: "angelgt", v: PARAMS?.["DAY"] || "2023-01-01", n: "dstart", t: "date" },
                { l: "ToDoBis", v: PARAMS?.["DAY"] || "2023-01-01", n: "dend", t: "date" },
                { l: "MinToDo", v: 1, n: "time", t: "range" }
              ]
            },
            "status": {
              title: "Maschine",
              subtitle: "wannwwas",
              icon: "vw-servicebell",
              info: "maschinen status automatik hand störung keinteil puffer",
              form: [
                { l: "TP", v: PARAMS?.["TP"] || "Technischer Platz", n: "tpl" },
                { l: "AF", v: PARAMS?.["AF"] || "Arbeitsfolge", n: "af" },
                { l: "Status", v: "A|H|S|K|P", n: "status" }
              ]
            },
            "value": {
              title: "Istwert",
              subtitle: "ISTerfassen",
              icon: "vw-calendar",
              info: "UnfallAnwesenheitStckzahl",
              form: [
                { l: "Team", v: PARAMS?.["TEAM"] || "2700-103-00007-TM1", n: "team" },
                { l: "KW", v: "KW22", n: "kw" },
                { l: "Tag", v: PARAMS?.["DAY"] || "2022-07-01", n: "day", t: "date" },
                { l: "zielwert", v: "Unfall", n: "zielwert" },
                { l: "typ", v: "IST", n: "typ" },
                { l: "value", v: 0, n: "value", t: "number" }
              ]
            },
            "playbook": {
              title: "PlayBook",
              subtitle: "PlaybookSatzErstellen",
              icon: "vw-gears",
              info: "neueAnforderungenTracken",
              form: [
                { l: "ID", v: "PLAYBOOKID", n: "pbid" },
                { l: "Ziel", v: "Ziel", n: "ziel" },
                { l: "Instrument", v: "instrument", n: "instrument" },
                { l: "Ersteller", v: "ersteller", n: "ersteller" },
                { l: "DefOfDone", v: "defofdone", n: "dod" }
              ]
            },
            "material": {
              title: "Ersatzteil",
              subtitle: "ausbuchen",
              icon: "vw-visualcheck",
              info: "ksubeachten",
              form: [
                { l: "TP", v: PARAMS?.["TP"] || "Technischer Platz", n: "tpl" },
                { l: "AF", v: PARAMS?.["AF"] || "Arbeitsfolge", n: "af" },
                { l: "Auftrag", v: PARAMS?.["DAY"] || "2023-01-01", n: "auftrag" },
                { l: "Material", v: "MATNummer", n: "material" },
                { l: "Menge", v: 0, n: "m", t: "number" },
                { l: "entnommen", v: PARAMS?.["DAY"] || "2023-01-01", n: "exdate", t: "date" }
              ]
            },
            "projekt": {
              title: "NeuesProjekt",
              subtitle: "NeueProjektIdeeErfassen",
              icon: "vw-factory",
              info: "neueProjektIdee",
              form: [
                { l: "ID", v: "PROJID", n: "pid" },
                { l: "Titel", v: "Titel", n: "titel" },
                { l: "Instrument", v: "instrument", n: "instrument" },
                { l: "Ersteller", v: "ersteller", n: "ersteller" },
                { l: "Beschreibung", v: "Beschreibung", n: "desc" }
              ]
            }
          }
      , TABS = ["rdf", "playbook", "person", "meldung", "value", "status", "material", "projekt"]
      , j2Dj = j => Object.entries(j).reduce((T, E) => { T[E[0]] = { S: E[1] }; return T }, {})
      , m2x = async (m, r, a = '../api/multiform') => {
          const x = await fetch("https://u05pt6bxf3.execute-api.eu-north-1.amazonaws.com/ev2dbput/something", { method: 'POST', body: JSON.stringify(r) })
          , j = await x.json();
          return j;
        }
      , setModal = (t, s, l) => {
          const f = JSON.parse(l);
          modalform.innerHTML = `<header>${t}<span class=info>${s}</span><span class=close onclick="modal.style.display='none'">&times;</span></header><form id=form>`
            + f.reduce((t, e) => t + `<div class="form-group"><label>${e.l}</label><input type="${e.t ? e.t : 'text'}" class="input-control" name="${e.n}" value="${e.v}" placeholder="${e.v}"></input></div>`, '')
            + '</form>';
          btnsave.removeEventListener('click', fbtnsave);
          fbtnsave = async event => {
            const fd = new FormData(document.querySelectorAll('#form')[0])
              , fj = Object.fromEntries([...fd.entries()]);
            fj['PID'] = t;
            fj['_time'] = Date.now().toString();
            fj['SID'] = Date.now().toString(35);
            document.querySelector('#info').textContent = `wait for...`;
            const j = await m2x('POST', j2Dj(fj));
            document.querySelector('#info').textContent = `${j.FailedEntryCount === 0 ? j.Entries[0]["EventId"] : 'ERROR'} `;
            modal.style.display = 'none';
          };
          btnsave.addEventListener('click', fbtnsave);
          modal.style.display = 'block';
        }
      , setMain = (z, l) => {
          main.innerHTML = z.reduce((t, e, i) => t + `<div class="flex-box" onclick=setModal('${l[e].title}','${l[e].subtitle}','` + JSON.stringify(l[e].form) + `')"><div class="title"><span><svg class="icon"><use href="#${l[e].icon || 'vw-as'}" /></svg></span> ${l[e].title}</div><div class="info">${l[e].subtitle}</div><div class="info">${l[e].info}</div></div>`, '')
        }
      , setMainC = (z, l) => {};

      btnsave.addEventListener('click', fbtnsave);
      setMain(TABS, LDATA);
    </script>
</body>
</html>
