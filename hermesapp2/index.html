    <!-- MODAL -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <div class="modal-form"></div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button id="formsave">OK</button>
        </div>
      </div>
    </div>

    <!-- DATALISTS -->
    <div id="datalists">
      <datalist id="NV"><option value="N.V.'"></datalist>
      <datalist id="style">
        <option value="nn">keineFunktion</option>
        <option value="i2m">Modal-Fenster</option>
        <option value="uf">FilterDimension</option>
        <option value="BC">BarCode</option>
      </datalist>
      <datalist id="media">
        <option value="td-hidden">ausblenden</option>
        <option value="th-width-3">S</option>
        <option value="th-width-5">M</option>
        <option value="th-width-8">L</option>
      </datalist>
    </div>

    <!-- HEADER -->
    <header>
      <div><sup>datengetrieben</sup> <strong>ShopFloor</strong></div>
      <div>Dashboard · Agentisch · Funktional</div>
      <div>
        <span id="info">...</span>
        <span>
          <svg class="s-icon"><use xlink:href="#vw-task" /></svg>
          <svg class="s-icon"><use xlink:href="#vw-logout" /></svg>
        </span>
      </div>
    </header>

    <nav></nav>

    <section>
      <main></main>
    </section>

    <!-- FOOTER -->

      <div>&copy; 2026-06-25 by hermes@wolfsflow</div>
      <div>datengetrieben · funktional · hierarchisch · agentisch</div>

    <script type="module" src="app.mjs"></script>
    <script>
      // LDATA: Form definitions for all entities
      const LDATA = {
        "rdf": {
          title: "RDF",
          subtitle: "RDF_Tripel_erfassen",
          icon: "vw-gridview",
          info: "Subject Praedikat Objekt",
          form: [
            { l: "lRDF", v: "xcontainsy", n: "nRDF" },
            { l: "lBEZ", v: "some", n: "BEZ" }
          ]
        },
        "person": {
          title: "Person",
          subtitle: "Adresse_erfassen",
          icon: "vw-edit",
          info: "Name Vorname",
          form: [
            { l: "Name", v: "Name", n: "name" },
            { l: "Vorname", v: "Vorname", n: "firstname" },
            { l: "Strasse", v: "Strasse", n: "street" },
            { l: "PLZ", v: "09110", n: "postalcode" },
            { l: "Ort", v: "Chemnitz", n: "city" },
            { l: "Telefon", v: "Telefon", n: "phone", t: "tel" },
            { l: "Code", v: "PW3432", n: "passwrd", t: "password" },
            { l: "eMail", v: "a@b.c", n: "mail", t: "email" }
          ]
        },
        "meldung": {
          title: "IH-Meldung",
          subtitle: "wannwowas",
          icon: "vw-download",
          info: "schnelle Rückmeldung",
          form: [
            { l: "TP", v: "Technischer Platz", n: "tpl" },
            { l: "AF", v: "Arbeitsfolge", n: "af" },
            { l: "Massnahme", v: "Massnahme", n: "action" },
            { l: "Bemerkung", v: "Bemerkung", n: "comment" },
            { l: "ElMech", v: "elektrisch|mechanisch", n: "typ" },
            { l: "angelgt", v: "2023-01-01", n: "dstart", t: "date" },
            { l: "ToDoBis", v: "2023-01-01", n: "dend", t: "date" },
            { l: "MinToDo", v: 1, n: "time", t: "range" }
          ]
        },
        "status": {
          title: "Maschine",
          subtitle: "wannwwas",
          icon: "vw-servicebell",
          info: "maschinen status automatik hand störung keinteil puffer",
          form: [
            { l: "TP", v: "Technischer Platz", n: "tpl" },
            { l: "AF", v: "Arbeitsfolge", n: "af" },
            { l: "Status", v: "A|H|S|K|P", n: "status" }
          ]
        },
        "value": {
          title: "Istwert",
          subtitle: "ISTerfassen",
          icon: "vw-calendar",
          info: "UnfallAnwesenheitStckzahl",
          form: [
            { l: "Team", v: "2700-103-00007-TM1", n: "team" },
            { l: "KW", v: "KW22", n: "kw" },
            { l: "Tag", v: "2022-07-01", n: "day", t: "date" },
            { l: "zielwert", v: "Unfall", n: "zielwert" },
            { l: "typ", v: "IST", n: "typ" },
            { l: "value", v: 0, n: "value", t: "number" }
          ]
        },
        "playbook": {
          title: "PlayBook",
          subtitle: "PlaybookSatzErstellen",
          icon: "vw-gears",
          info: "neueAnforderungenTracken",
          form: [
            { l: "ID", v: "PLAYBOOKID", n: "pbid" },
            { l: "ZIEl", v: "Ziel", n: "ziel" },
            { l: "INSTRUMENT", v: "instrument", n: "instrument" },
            { l: "ERSTELLER", v: "ersteller", n: "ersteller" },
            { l: "DefOfDone", v: "defofdone", n: "dod" }
          ]
        },
        "material": {
          title: "Ersatzteil",
          subtitle: "ausbuchen",
          icon: "vw-visualcheck",
          info: "ksubeachten",
          form: [
            { l: "TP", v: "Technischer Platz", n: "tpl" },
            { l: "AF", v: "Arbeitsfolge", n: "af" },
            { l: "Auftrag", v: "2023-01-01", n: "auftrag" },
            { l: "Material", v: "MATNummer", n: "af" },
            { l: "Menge", v: 0, n: "m", t: "number" },
            { l: "entnommen", v: "2023-01-01", n: "exdate", t: "date" }
          ]
        },
        "projekt": {
          title: "NewProjectIdea",
          subtitle: "NeueProjektIdeeErfassen",
          icon: "vw-factory",
          info: "neueProjektIdee",
          form: [
            { l: "ID", v: "PROJID", n: "pbid" },
            { l: "Titel", v: "Titel", n: "titel" },
            { l: "INSTRUMENT", v: "instrument", n: "instrument" },
            { l: "ERSTELLER", v: "ersteller", n: "ersteller" }
          ]
        }
      };

      const TABS = ["rdf", "playbook", "person", "meldung", "value", "material", "status", "projekt"];

      // Modal elements
      const modal = document.getElementById('modal');
      const modalform = document.querySelector('.modal-form');
      const btnsave = document.getElementById('formsave');
      const main = document.querySelector('main');

      // setModal: opens modal with form
      const setModal = (t, s, l) => {
        const f = JSON.parse(l);
        modalform.innerHTML = `<header>${t}<span class="info">${s}</span><span class="close" id="modal-close">&times;</span></header><form id="form">`
          + f.reduce((t, e) => t + `<div class="form-group"><label>${e.l}</label><input type="${e.t ? e.t : 'text'}" class="input-control" name="${e.n}" value="${e.v}" placeholder="${e.v}"></input></div>`, '')
          + '</form>';

        // Close button via addEventListener (NOT inline onclick)
        document.getElementById('modal-close').addEventListener('click', () => {
          modal.style.display = 'none';
        });

        // Save button via addEventListener (NOT inline onclick)
        if (typeof fbtnsave === 'function') btnsave.removeEventListener('click', fbtnsave);
        let fbtnsave = async (event) => {
          const fd = new FormData(document.getElementById('form'));
          const fj = Object.fromEntries([...fd.entries()]);
          fj['PID'] = t;
          fj['_time'] = Date.now().toString();
          fj['SID'] = Date.now().toString(35);
          document.querySelector('#info').textContent = 'wait for...';
          // Simulated API call - would be: await m2x('POST', j2Dj(fj))
          document.querySelector('#info').textContent = 'saved';
          modal.style.display = 'none';
        };
        btnsave.addEventListener('click', fbtnsave);

        // CRITICAL: display='flex' for centering (NOT 'block')
        modal.style.display = 'flex';
      };

      // setMain: renders boxes then binds click via addEventListener (NOT inline onclick)
      const setMain = (z, l) => {
        main.innerHTML = z.reduce((t, e, i) => t + `<div class="flex-box" data-idx="${i}"><div class="title"><span><svg class="icon"><use href="#${l[e].icon || 'vw-as'}" /></svg></span> ${l[e].title}</div><div class="info">${l[e].subtitle}</div><div class="info">${l[e].info}</div></div>`, '');
        document.querySelectorAll('.flex-box').forEach((el, i) => {
          const key = z[i];
          el.addEventListener('click', () => setModal(l[key].title, l[key].subtitle, JSON.stringify(l[key].form)));
        });
      };

      // Initialize
      setMain(TABS, LDATA);
    </script>
  </body>
</html>
