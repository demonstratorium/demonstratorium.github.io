  <link rel="stylesheet" href="main.css">
  <title>Einkaufsapp</title>
  <style>
    #saved-list { margin-top:1rem; width:100%; }
    .saved-item {
      display:flex; justify-content:space-between; align-items:center;
      padding:.5rem .8rem; margin:.2rem 0;
      background:hsl(var(--baseHue),100%,13%);
      border-radius:.3rem;
    }
    .saved-item .close { font-size:1.2rem; opacity:.5; cursor:pointer; }
    .saved-item .close:hover { opacity:1; }
    main>div.box {
      display:flex; flex-direction:column;
      border:1px solid hsl(var(--baseHue),55%,55%,.3);
      width:clamp(14rem,18vw,20rem); height:7rem;
      border-radius:.3rem; cursor:pointer;
      transition:border-color .2s;
    }
    main>div.box:hover {
      border-color:hsl(var(--baseHue),55%,55%);
    }
    .box header { padding:.5rem; font-weight:bold; }
    .box .small { padding:0 .5rem .5rem; }
    footer .badge { opacity:.5; }
  </style>
</head>
<body>
  <!-- ICONS -->
  <svg def id=icons style="display:none"></svg>

  <!-- MODAL -->
  <div class=modal>
    <div class=modal-content>
      <div class=modal-form><span>some</span></div>
      <div class=form-group><label>&nbsp;</label><button id=formsave>OK</button></div>
    </div>
  </div>

  <!-- DATALISTS -->
  <div id='datalists' style="display:none">
    <datalist id='kat_einkauf'>
      <option value='Lebensmittel'>
      <option value='Getränke'>
      <option value='Haushalt'>
      <option value='Pflege'>
      <option value='Sonstiges'>
    </datalist>
    <datalist id='kat_rezept'>
      <option value='Vorspeise'>
      <option value='Hauptgericht'>
      <option value='Dessert'>
      <option value='Snack'>
      <option value='Getränk'>
    </datalist>
  </div>

  <header>
    <div><sup>🍴</sup> <strong>Einkaufsapp</strong></div>
    <div>Einkaufsliste &amp; Rezepte</div>
    <div><span id="info">...</span></div>
  </header>

  <section>
    <main>
      <!-- Form-Tiles werden von app_einkauf.mjs gerendert -->
    </main>
    <div style="padding:.5rem 1rem">
      <span onclick="document.querySelector('#saved-list').style.display=document.querySelector('#saved-list').style.display==='none'?'block':'none'"
            style="cursor:pointer;opacity:.7;font-size:.9rem">📋 Gespeicherte Einträge anzeigen</span>
    </div>
    <div id="saved-list" style="padding:0 1rem 2rem;display:block"></div>
  </section>

  <footer>
    &copy; 2026 by hermes@wolfsflow
    <span class="badge">einkaufsapp · demo · 0 dependencies</span>
  </footer>
</body>
<script async type="module" src="app_einkauf.mjs"></script>
</html>
