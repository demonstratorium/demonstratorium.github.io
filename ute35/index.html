<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ude 35 - Haushaltsausgaben</title>
<style>
:root{--baseHue:210;--txt:#eee;--bg:#111;--head:#222;--accent:#0066cc}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:var(--bg);color:var(--txt);padding:1rem}
h1{color:#fff;margin-bottom:.5rem}
.gf-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.gf-btn{background:var(--head);border:1px solid #555;color:var(--txt);padding:.4rem .8rem;cursor:pointer;border-radius:4px;font-size:.9rem}
.gf-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
table{width:100%;border-collapse:collapse;background:#1a1a1a}
th,td{border:1px solid #333;padding:.5rem;text-align:left}
th{background:var(--head);color:#fff}
.betrag{text-align:right}
.sum{background:#222;color:#4caf50;font-weight:bold}
#stats{display:flex;gap:2rem;margin:1rem 0;color:#888;font-size:.9rem}
#stats div{background:#1a1a1a;padding:.5rem 1rem;border-radius:4px}
</style>
</head>
<body>
<h1>Ude 35 - Haushaltsausgaben</h1>
<div class="gf-bar" id="gf-bar"></div>
<div id="stats">
  <div>Gesamt: <span id="sum-gesamt">0</span> €</div>
  <div>Zeilen: <span id="cnt-rows">0</span></div>
</div>
<div id="app"></div>
<script>
const L_KT = {
  'Versicherungen': 'V1 - Versicherungen',
  'Pkw': 'V2 - Pkw/KFZ',
  'Nahrungsmittel': 'V3 - Lebensmittel',
  'Sport': 'V4 - Sport/Fitness',
  'Sonstiges': 'V9 - Sonstiges'
};

// 5000 realistische Testdaten
const daten = [];
const kats = Object.keys(L_KT);
const start = new Date('2023-01-01');

for(let i=0; i<5000; i++){
  const d = new Date(start);
  d.setDate(d.getDate() + Math.floor(Math.random() * 900)); // 3 Jahre
  const betrag = (Math.random() * 400 + 5).toFixed(2); // 5-405 €
  daten.push({
    _id: i+1,
    datum: d.toISOString().split('T')[0],
    PYY: 'Y' + d.getFullYear().toString().slice(2),
    PMM: 'M' + (d.getMonth()+1).toString().padStart(2,'0'),
    kategorie: kats[Math.floor(Math.random() * kats.length)],
    betrag: parseFloat(betrag)
  });
}

let filter = {PYY:'', PMM:'', kategorie:''};

function render(){
  const rows = daten.filter(e=>{
    if(filter.PYY && e.PYY !== filter.PYY) return false;
    if(filter.PMM && e.PMM !== filter.PMM) return false;
    if(filter.kategorie && e.kategorie !== filter.kategorie) return false;
    return true;
  });
  
  let html = '<table>';
  html += '<tr><th>ID</th><th>Datum</th><th>Jahr/Monat</th><th>Kategorie</th><th>Betrag</th></tr>';
  
  const sum = rows.reduce((s,e)=>s+e.betrag,0);
  document.getElementById('sum-gesamt').textContent = sum.toFixed(2);
  document.getElementById('cnt-rows').textContent = rows.length;
  
  rows.slice(0,200).forEach(e=>{
    html += `<tr>
      <td>${e._id}</td>
      <td>${e.datum}</td>
      <td>${e.PYY}/${e.PMM}</td>
      <td>${L_KT[e.kategorie] || e.kategorie}</td>
      <td class="betrag">${e.betrag.toFixed(2)} €</td>
    </tr>`;
  });
  
  if(rows.length > 200){
    html += `<tr class="sum"><td colspan="4">... + ${rows.length-200} weitere Zeilen</td><td class="betrag">${sum.toFixed(2)} €</td></tr>`;
  }
  html += '</table>';
  document.getElementById('app').innerHTML = html;
}

// GF Buttons
const years = [...new Set(daten.map(d=>d.PYY))].sort();
const months = [...new Set(daten.map(d=>d.PMM))].sort();
const kats = [...new Set(daten.map(d=>d.kategorie))].sort();

let gf = '';
gf += '<button class="gf-btn" onclick="setGF(\'PYY\',\'\')">Jahr: Alle</button>';
years.forEach(y=>gf += `<button class="gf-btn" onclick="setGF('PYY','${y}')">${y}</button>`);
gf += '<button class="gf-btn" onclick="setGF(\'PMM\',\'\')">Monat: Alle</button>';
months.forEach(m=>gf += `<button class="gf-btn" onclick="setGF('PMM','${m}')">${m}</button>`);
gf += '<button class="gf-btn" onclick="setGF(\'kategorie\',\'\')">Kategorie: Alle</button>';
Object.entries(L_KT).forEach(([k,v])=>gf += `<button class="gf-btn" onclick="setGF('kategorie','${k}')">${v}</button>`);
document.getElementById('gf-bar').innerHTML = gf;

function setGF(col,val){
  filter[col] = val;
  render();
}

render();
</script>
</body>
</html>
