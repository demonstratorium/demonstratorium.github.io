<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="description" content="RDF-Hierarchie: Text-Tripel → RKV-Histogramm → Filter → Baum">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="main.css">
  <title>rdf@hierarchie</title>
  <style>
    .rdf-layout { display:flex; gap:.5rem; padding:.5rem; flex-grow:1; }
    aside { width:clamp(14rem,25%,20rem); background:hsl(var(--baseHue),100%,12%); border-radius:.3rem; padding:.5rem; overflow-y:auto; max-height:75vh; }
    aside > div { padding:.15rem 0; }
    aside a { cursor:pointer; }
    aside a:hover { opacity:.8; }
    #rdf-input, #rdfinfo {
      flex:1; min-height:12rem;
      background:hsl(var(--baseHue),100%,10%);
      color:hsl(var(--baseHue),100%,90%);
      border:1px solid hsl(var(--baseHue),55%,55%,.3);
      border-radius:.3rem; padding:.5rem;
      font-family:'Fira Mono',monospace; font-size:.8rem;
    }
    .main-content { flex:1; display:flex; flex-direction:column; gap:.5rem; }
    .modal-form { background:hsl(var(--baseHue),100%,12%); border-radius:.3rem; padding:.8rem; }
    .modal-form header { font-weight:bold; margin-bottom:.5rem; }
    nav { gap:.5rem; flex-wrap:wrap; align-items:center; font-size:.8rem; padding:.3rem 1rem; }
    nav span[class="oneofn"] {
      color:gray; padding:.1rem .4rem; display:inline-block;
      border:1px solid gray; border-radius:.2rem; cursor:pointer; margin:.1rem;
      font-size:.75rem;
    }
    nav span[style="margin-left:0.5rem"] { opacity:.5; font-size:.7rem; }
    .btn-row { display:flex; gap:.5rem; padding-bottom:.5rem; }
    .btn-row button {
      padding:.3rem .8rem; border:1px solid hsl(var(--baseHue),55%,55%,.4);
      background:hsl(var(--baseHue),55%,20%); color:hsl(var(--baseHue),100%,90%);
      border-radius:.3rem; cursor:pointer; font-size:.8rem;
    }
    .btn-row button:hover { background:hsl(var(--baseHue),55%,30%); }
    @media (max-width:768px) {
      .rdf-layout { flex-direction:column; }
      aside { width:auto; max-height:30vh; }
    }
  </style>
</head>
<body>
  <!-- ICONS -->
  <svg def id=icons style="display:none"></svg>
  <!-- MODAL -->
  <div class=modal><div class=modal-content><div class=modal-form><span>some</span></div><div class=form-group><label>&nbsp;</label><button id=formsave>OK</button></div></div></div>

  <header>
    <div><sup>🔗</sup> <strong>RDF Hierarchie</strong></div>
    <div><svg class=icon><use href="#hw-gridview"/></svg> Text-Tripel → RKV → Filter → Baum</div>
    <div><span id="info">...</span></div>
  </header>

  <nav>
    <span id="types"><span></span></span>
    <span id="attributes"><span></span></span>
    <span id="keyvalues"><span>kv</span></span>
  </nav>

  <section class="rdf-layout">
    <aside>
      <a onclick="_.H.DE(document.querySelector('#aside'),document.getElementById('VR0'));_.H.DE(document.querySelector('#aside'),document.getElementById('VR1'));_.H.DE(document.querySelector('#aside'),document.getElementById('VR2'))">
        <svg class=icon><use href="#hw-delete"/></svg>
      </a>
      <a onclick="_.X.OK(_.H['MH'](_.H['JH'](_.DATA['rdf']))).forEach((e,i)=>_.H['AE'](document.querySelector('#aside'),e,'VR'+i,_.DATA['rdf']))">
        <svg class=icon><use href="#hw-gridview"/></svg>
      </a>
      <div id="aside"></div>
    </aside>

    <div class="main-content">
      <div class="btn-row">
        <button id="parse-btn">🔍 Analysieren</button>
        <button id="example-btn">📄 Beispiel laden</button>
      </div>

      <div class="modal-form">
        <header>JSON-LD RDF Ontologie</header>
        <textarea id="rdf-input" placeholder="empolis hat Type enterprise&#10;empolis hat sitz kaiserslautern&#10;Personals contains klueter&#10;steinacker hat firstname achim&#10;steinacker hat position director-delivery-operations&#10;..."></textarea>
      </div>

      <div class="modal-form">
        <header>Info</header>
        <textarea id="rdfinfo" readonly>...</textarea>
      </div>
    </div>
  </section>

  <footer>
    &copy; 2026 by hermes@wolfsflow
    <span>rdf-hierarchie · _.R.B · _.R.RKV · _.R.b4RKV · _.H.AE</span>
  </footer>
</body>
<script async type="module" src="app_rdf.mjs"></script>
</html>
