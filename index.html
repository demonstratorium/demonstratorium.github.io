<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hermes@wolfsflow</title>
  <style>
    :root { --baseHue: 210; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100vh; font-family:sans-serif;
      background:hsl(var(--baseHue),100%,8%);
      color:hsl(var(--baseHue),100%,95%);
    }
    .container { text-align:center; padding:2rem; }
    h1 { font-size:clamp(2rem,5vw,4rem); margin-bottom:1rem; letter-spacing:.1em; }
    .badge {
      display:inline-block; padding:.5rem 1.5rem; margin-top:2rem;
      border:1px solid hsl(var(--baseHue),55%,55%);
      border-radius:.3rem; font-size:.9rem;
      color:hsl(var(--baseHue),55%,55%);
    }
    .status { margin-top:1.5rem; font-size:.8rem; opacity:.5; }
    footer {
      position:fixed; bottom:0; width:100%; padding:.8rem;
      text-align:center; font-size:.75rem; opacity:.4;
      background:hsl(var(--baseHue),100%,13%);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧</h1>
    <h1>under construction</h1>
    <p>Die Inhalte werden überarbeitet.</p>
    <div class="badge">hermes@wolfsflow</div>
    <div class="status">Status: Migration in Bearbeitung</div>
  </div>
  <footer>hermes@wolfsflow · 2026</footer>
</body>
</html>
